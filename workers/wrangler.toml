name = "een-construction-unsub"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[[kv_namespaces]]
binding = "SUPPRESSION"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

[vars]
# UNSUBSCRIBE_SECRET is set as a secret via: wrangler secret put UNSUBSCRIBE_SECRET
# UPSTASH_REDIS_URL and UPSTASH_REDIS_TOKEN are optional for cross-system sync
